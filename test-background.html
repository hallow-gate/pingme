<!-- test-background.html -->
<!DOCTYPE html>
<html>
<head>
    <title>Test Background Notifications</title>
</head>
<body>
    <h1>Background Notification Test</h1>
    <div id="status"></div>
    <button onclick="testBackground()">Test Background</button>
    
    <script>
    async function testBackground() {
        const status = document.getElementById('status');
        status.innerHTML = 'Testing...';
        
        if ('serviceWorker' in navigator) {
            const registration = await navigator.serviceWorker.ready;
            
            // Send test message to service worker
            if (registration.active) {
                registration.active.postMessage({ type: 'FORCE_CHECK' });
                status.innerHTML = '✅ Test triggered - check for notification in 5 seconds';
                
                // Also schedule a test notification
                setTimeout(async () => {
                    await registration.showNotification('Background Test', {
                        body: 'This notification was sent while testing background mode',
                        icon: '/favicon.ico',
                        tag: 'background-test'
                    });
                }, 5000);
            }
        }
    }
    
    // Monitor service worker
    navigator.serviceWorker.addEventListener('message', (event) => {
        console.log('Message from SW:', event.data);
    });
    </script>
</body>
</html>
